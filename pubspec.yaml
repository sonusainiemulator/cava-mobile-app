name: tequila_app
description: Tequila App - API Token client (Sync + Cava + Content + Chat + Scan)
publish_to: 'none'
version: 1.3.4+20

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.2.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.5
  geolocator: ^13.0.2
  shared_preferences: ^2.3.3
  dio: ^5.7.0
  html: ^0.15.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
